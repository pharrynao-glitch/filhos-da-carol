<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>filhos da Carol</title>
    <style>
        body {
            /* Fundo Azul Claro */
            background-color: #add8e6;
            /* EFEITO DE GLITTER AZUL DIRETO NO CÓDIGO */
            background-image: 
                radial-gradient(circle, #00ffff 1px, transparent 1px),
                radial-gradient(circle, #ffffff 1px, transparent 1px);
            background-size: 50px 50px, 30px 30px;
            background-attachment: fixed;
            text-align: center;
            padding: 20px;
            margin: 0;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            animation: brilhoFundo 3s infinite alternate;
        }

        @keyframes brilhoFundo {
            from { background-position: 0 0, 0 0; }
            to { background-position: 10px 10px, -10px -10px; }
        }

        h1 {
            font-size: 55px;
            /* AZUL BEM ESCURO (MARINHO) */
            color: #001a33; 
            text-shadow: 2px 2px 15px rgba(0, 255, 255, 0.8);
            margin-bottom: 30px;
        }

        .fotos-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border: 10px solid white;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: 0.4s;
        }

        img:hover {
            transform: scale(1.1) rotate(3deg);
            box-shadow: 0 0 40px #00ffff;
            cursor: pointer;
        }

        .caixa-som {
            margin-top: 40px;
            background: white;
            padding: 25px;
            border-radius: 60px;
            display: inline-block;
            border: 6px solid #001a33;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .botao-play {
            background: #001a33;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .botao-play:hover {
            background: #00ffff;
            color: #001a33;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <h1>✨ filhos da Carol ✨</h1>

    <div class="fotos-container">
        <img src="gato.jpg">
        <img src="gatoo.jpg">
    </div>

    <div class="caixa-som">
        <p style="color: #001a33; font-weight: bold;">🐾 Toque abaixo para a música! 🐾</p>
        <button class="botao-play" onclick="tocar()">▶ DAR O PLAY</button>
    </div>

    <audio id="musica" loop>
        <source src="musica.mp3" type="audio/mpeg">
        <source src="musica2.mp3" type="audio/mpeg">
    </audio>

    <script>
        function tocar() {
            var audio = document.getElementById('musica');
            audio.play().catch(function(error) {
                alert("Erro! Verifique se o arquivo musica.mp3 está no seu GitHub.");
            });
        }
    </script>

</body>
</html>
