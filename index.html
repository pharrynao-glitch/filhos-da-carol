<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>filhos da Carol</title>
    <style>
        body {
            /* Fundo azul claro com patinhas e glitter azul */
            background-image: url('https://imgur.com/vHqYvQW.png');
            background-size: cover;
            background-attachment: fixed;
            color: white;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 50px;
            color: #fff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #00ffff;
            margin-bottom: 20px;
        }
        .fotos-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        img {
            width: 300px;
            height: auto;
            border: 5px solid #fff;
            border-radius: 15px;
            box-shadow: 0 0 15px #00ffff;
        }
        .musica {
            margin-top: 30px;
            background: rgba(0, 191, 255, 0.3);
            padding: 20px;
            border-radius: 50px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <h1>✨ filhos da Carol ✨</h1>

    <div class="fotos-container">
        <img src="gato.jpg" alt="Gatinho 1">
        <img src="gatoo.jpg" alt="Gatinho 2">
    </div>

    <div class="musica">
        <p>🎵 Clique no Play para ouvir! 🎵</p>
        <audio controls loop>
            <source src="musica.mp3" type="audio/mpeg">
        </audio>
    </div>

</body>
</html>
