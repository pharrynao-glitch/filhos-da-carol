<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>filhos da Carol</title>
    <style>
        body {
            background-color: #add8e6; 
            background-image: url('https://www.transparenttextures.com/patterns/paw-prints.png'), url('https://www.transparenttextures.com/patterns/glitter.png');
            background-attachment: fixed;
            color: #005f73;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            font-size: 45px;
            color: #ffffff;
            text-shadow: 2px 2px 10px #00ffff;
            margin-top: 20px;
        }
        .container {
            display: block;
            margin: 0 auto;
        }
        img {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border: 10px solid white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin: 15px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #00ffff;
        }
        .caixa-musica {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 50px;
            display: inline-block;
            border: 4px solid #00ffff;
        }
    </style>
</head>
<body>

    <h1>✨ filhos da Carol ✨</h1>

    <div class="container">
        <img src="gato.jpg">
        <img src="gatoo.jpg">
    </div>

    <div class="caixa-musica">
        <p>🐾 <b>Dê o Play!</b> 🐾</p>
        <audio controls loop>
            <source src="musica2.mp3" type="audio/mpeg">
            Seu navegador não suporta som.
        </audio>
    </div>

</body>
</html>
