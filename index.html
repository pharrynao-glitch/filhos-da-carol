<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>filhos da Carol</title>
    <style>
        body {
            background-color: #add8e6;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.3) 2px, transparent 40px),
                radial-gradient(#00ffff, rgba(0,255,255,.1) 1px, transparent 30px);
            background-size: 100px 100px, 50px 50px;
            background-attachment: fixed;
            text-align: center;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            margin: 0; padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        h1 {
            font-size: 32px;
            color: #001a33; /* Azul bem escuro */
            text-shadow: 0 0 12px #ffffff;
            margin: 20px 0;
        }

        .fotos {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        img {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border: 8px solid white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .painel {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 40px;
            display: inline-block;
            border: 4px solid #001a33;
            width: 85%;
            max-width: 300px;
        }

        .btn-magico {
            background: #001a33;
            color: white;
            border: none;
            padding: 20px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 6px 0 #000;
            transition: all 0.1s;
            /* Remove o delay de clique no iOS */
            touch-action: manipulation;
        }

        .btn-magico:active {
            box-shadow: 0 2px 0 #000;
            transform: translateY(4px);
        }
    </style>
</head>
<body>

    <h1>✨ filhos da Carol ✨</h1>

    <div class="fotos">
        <img src="gato.jpg">
        <img src="gatoo.jpg">
    </div>

    <div class="painel">
        <p style="color: #001a33; margin-bottom: 15px;">🐾 <b>APERTE PARA O SOM!</b> 🐾</p>
        <button class="btn-magico" id="playBtn">▶ COMEÇAR FESTA</button>
    </div>

    <audio id="player" loop playsinline preload="auto">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('playBtn');
        const audio = document.getElementById('player');

        // Função única para iOS e Android
        function toggleAudio(e) {
            e.preventDefault(); // Previne comportamento padrão do navegador
            
            if (audio.paused) {
                audio.play().then(() => {
                    btn.innerHTML = "🔊 TOCANDO...";
                    btn.style.background = "#00ffff";
                    btn.style.color = "#001a33";
                }).catch(err => {
                    console.log("Erro ao carregar áudio");
                    alert("Ainda carregando... tente de novo em 3 segundos!");
                });
            } else {
                audio.pause();
                btn.innerHTML = "▶ COMEÇAR FESTA";
                btn.style.background = "#001a33";
                btn.style.color = "white";
            }
        }

        // Adiciona suporte para toque e clique de mouse
        btn.addEventListener('touchstart', toggleAudio, false);
        btn.addEventListener('click', toggleAudio, false);
    </script>

</body>
</html>
