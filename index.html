<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>filhos da Carol</title>
    <style>
        body {
            background-color: #add8e6;
            background-image: url('https://www.transparenttextures.com/patterns/paw-prints.png'), url('https://www.transparenttextures.com/patterns/glitter.png');
            background-attachment: fixed;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-align: center;
            color: #005f73;
            padding: 20px;
        }
        h1 { font-size: 45px; color: white; text-shadow: 2px 2px 10px #00ffff; }
        .foto { 
            width: 280px; height: 280px; object-fit: cover; 
            border: 10px solid white; border-radius: 20px; 
            margin: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .foto:hover { transform: scale(1.05); box-shadow: 0 0 30px #00ffff; }
        .msg-som { background: white; padding: 10px; border-radius: 20px; display: inline-block; margin-top: 20px; border: 2px solid #00ffff; }
    </style>
</head>
<body>

    <h1>✨ filhos da Carol ✨</h1>

    <img src="gato.jpg" class="foto">
    <img src="gatoo.jpg" class="foto">

    <br>
    <div class="msg-som">
        <p>🎵 <b>A música deve começar ao clicar na tela!</b> 🎵</p>
        <audio id="meuAudio" loop>
            <source src="musica2.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // Esse código tenta tocar a música assim que a pessoa clica em qualquer lugar do site
        document.body.addEventListener('click', function() {
            var audio = document.getElementById('meuAudio');
            audio.play();
        }, { once: true }); // Executa só uma vez
    </script>

</body>
</html>
