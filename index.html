<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>filhos da Carol</title>
    <style>
        body {
            /* Fundo Azul Claro com textura de Glitter e Patinhas */
            background-color: #add8e6; 
            background-image: url('https://www.transparenttextures.com/patterns/glitter.png'), url('https://www.transparenttextures.com/patterns/paw-prints.png');
            background-attachment: fixed;
            color: white;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 50px;
            color: #fff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            margin-bottom: 20px;
        }
        .fotos-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        img {
            width: 300px;
            height: auto;
            border: 8px solid white;
            border-radius: 20px;
            box-shadow: 0 0 20px #00ffff;
        }
        .musica-box {
            margin-top: 30px;
            background: rgba(0, 150, 255, 0.5);
            padding: 25px;
            border-radius: 50px;
            display: inline-block;
            border: 3px solid #fff;
        }
    </style>
</head>
<body>

    <h1>✨ filhos da Carol ✨</h1>

    <div class="fotos-container">
        <img src="gato.jpg" alt="Gatinho 1">
        <img src="gatoo.jpg" alt="Gatinho 2">
    </div>

    <div class="musica-box">
        <p style="font-weight: bold;">🎵 Clique no Play para ouvir! 🎵</p>
        <audio controls loop>
            <source src="musica.mp3" type="audio/mpeg">
            Seu navegador não suporta áudio.
        </audio>
    </div>

</body>
</html>
