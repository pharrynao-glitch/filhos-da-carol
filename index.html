<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>filhos da Carol</title>
    <style>
        body {
            background-color: #add8e6;
            background-image: url('https://www.transparenttextures.com/patterns/paw-prints.png'), url('https://www.transparenttextures.com/patterns/glitter.png');
            background-attachment: fixed;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-align: center;
            color: #005f73;
            padding: 20px;
        }
        h1 { font-size: 45px; color: white; text-shadow: 2px 2px 10px #00ffff; }
        img { 
            width: 280px; height: 280px; object-fit: cover; 
            border: 10px solid white; border-radius: 20px; 
            margin: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        img:hover { transform: scale(1.1); box-shadow: 0 0 30px #00ffff; }
        
        /* BOTÃO DE SOM MÁGICO */
        .botao-som {
            background: #fff;
            color: #008b8b;
            border: 4px solid #00ffff;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-top: 20px;
            transition: 0.3s;
        }
        .botao-som:hover { background: #00ffff; color: white; transform: scale(1.1); }
    </style>
</head>
<body>

    <h1>✨ filhos da Carol ✨</h1>

    <img src="gato.jpg">
    <img src="gatoo.jpg">

    <br>
    
    <button class="botao-som" onclick="tocarMusica()">🐾 CLIQUE AQUI PARA O SOM! 🐾</button>

    <audio id="meuAudio" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        function tocarMusica() {
            var audio = document.getElementById('meuAudio');
            audio.play().then(() => {
                alert("Aproveite a música dos gatinhos! 🎵");
            }).catch(error => {
                alert("Erro ao tocar! Verifique se o arquivo musica.mp3 está no GitHub.");
            });
        }
    </script>

</body>
</html>
