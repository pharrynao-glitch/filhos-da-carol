<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>filhos da Carol</title>
    <style>
        body {
            background-color: #add8e6; 
            background-image: url('https://www.transparenttextures.com/patterns/paw-prints.png'), url('https://www.transparenttextures.com/patterns/glitter.png');
            background-attachment: fixed;
            color: #005f73;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 50px;
            color: #fff;
            text-shadow: 2px 2px 10px #00ffff, -2px -2px 10px #00ffff;
            margin-bottom: 20px;
        }
        img {
            width: 300px;
            border: 8px solid white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin: 10px;
        }
        .musica-container {
            margin-top: 30px;
            background: white;
            padding: 25px;
            border-radius: 60px;
            display: inline-block;
            border: 5px solid #00ffff;
        }
    </style>
</head>
<body>

    <h1>✨ filhos da Carol ✨</h1>

    <div class="fotos">
        <img src="gato.jpg">
        <img src="gatoo.jpg">
    </div>

    <div class="musica-container">
        <p style="font-size: 20px;">🐾 <b>CLIQUE NO PLAY ABAIXO!</b> 🐾</p>
        
        <audio controls loop preload="auto">
            <source src="./musica.mp3" type="audio/mpeg">
            Seu navegador não suporta áudio.
        </audio>
    </div>

</body>
</html>
