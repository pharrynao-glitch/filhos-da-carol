<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>filhos da Carol</title>
    <style>
        body {
            /* Fundo Azul Claro com Patinhas e Brilho */
            background-color: #add8e6; 
            background-image: url('https://www.transparenttextures.com/patterns/paw-prints.png'), url('https://www.transparenttextures.com/patterns/glitter.png');
            background-attachment: fixed;
            color: #005f73;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 50px;
            color: #fff;
            text-shadow: 2px 2px 10px #00ffff, -2px -2px 10px #00ffff;
            margin-bottom: 30px;
        }
        .fotos-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        /* FOTOS IGUAIS E COM MOLDURA */
        img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border: 10px solid white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin: 10px;
            
            /* Efeito de transição suave */
            transition: all 0.3s ease-in-out;
        }
        
        /* EFEITO DE GLITTER AO PASSAR O MOUSE (HOVER) */
        img:hover {
            transform: scale(1.05); /* Aumenta um pouquinho a foto */
            box-shadow: 0 0 25px #00ffff, 0 0 50px #00ffff; /* Brilho neon intenso */
            cursor: pointer;
        }
