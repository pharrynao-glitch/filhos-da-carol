<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>filhos da Carol</title>
    <style>
        body {
            background-color: #add8e6;
            /* GLITTER AZUL QUE SE MOVE */
            background-image: 
                radial-gradient(#ffffff 1px, transparent 1px),
                radial-gradient(#00ffff 1px, transparent 1px);
            background-size: 40px 40px, 20px 20px;
            background-attachment: fixed;
            text-align: center;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            margin: 0; padding: 20px;
        }

        h1 {
            font-size: 38px;
            color: #001a33; /* AZUL BEM ESCURO */
            text-shadow: 0 0 10px #ffffff, 0 0 20px #00ffff;
            margin: 25px 0;
        }

        .fotos {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        img {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border: 10px solid white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        /* EFEITO DE BRILHO NO HOVER */
        img:hover { transform: scale(1.05); box-shadow: 0 0 30px #00ffff; }

        .painel {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 50px;
            display: inline-block;
            border: 5px solid #001a33;
            width: 90%;
            max-width: 320px;
        }

        .btn-play {
            background: #001a33;
            color: white;
            border: none;
            padding: 20px;
            width: 100%;
            font-size: 22px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

    <h1>✨ filhos da Carol ✨</h1>

    <div class="fotos">
        <img src="gato.jpg">
        <img src="gatoo.jpg">
    </div>

    <div class="painel">
        <p style="color: #001a33; font-size: 18px; margin-bottom: 15px;"><b>🐾 TOQUE PARA O SOM! 🐾</b></p>
        <button class="btn-play" id="bt">▶ TOCAR MÚSICA</button>
    </div>

    <audio id="msc" loop playsinline preload="auto">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('bt');
        const audio = document.getElementById('msc');

        // Função de clique/toque ultra rápida
        const iniciar = (e) => {
            e.preventDefault();
            if (audio.paused) {
                audio.play()
                    .then(() => {
                        btn.innerHTML = "🔊 TOCANDO...";
                        btn.style.background = "#00ffff";
                        btn.style.color = "#001a33";
                    })
                    .catch(err => {
                        alert("O celular bloqueou o som! Verifique se a chavinha lateral do iPhone está ligada e tente de novo.");
                    });
            } else {
                audio.pause();
                btn.innerHTML = "▶ TOCAR MÚSICA";
                btn.style.background = "#001a33";
                btn.style.color = "white";
            }
        };

        btn.addEventListener('click', iniciar);
        btn.addEventListener('touchstart', iniciar);
    </script>

</body>
</html>
