<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>filhos da Carol</title>
    <style>
        body {
            /* Fundo de glitter */
            background-image: url('https://media.giphy.com/media/3o7TKrEzvLbgqjOUO4/giphy.gif');
            background-size: cover;
            color: white;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 50px;
            color: #fff;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 30px #ff00ff;
            margin-bottom: 20px;
        }
        .fotos-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        img {
            width: 300px;
            height: auto;
            border: 5px solid #fff;
            border-radius: 15px;
            box-shadow: 0 0 15px #ff69b4;
        }
        .musica {
            margin-top: 30px;
            background: rgba(255, 105, 180, 0.3);
            padding: 20px;
            border-radius: 50px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <h1>✨ filhos da Carol ✨</h1>

    <div class="fotos-container">
        <img src="gato.jpg" alt="Gatinho 1">
        <img src="gatoo.jpg" alt="Gatinho 2">
    </div>

    <div class="musica">
        <p>🎵 Solta o som! 🎵</p>
        <audio controls loop>
            <source src="musica.mp3" type="audio/mpeg">
        </audio>
    </div>

</body>
</html>
